<div
  class="modal fade"
  id="cancelModal"
  tabindex="-1"
  role="dialog"
  aria-labelledby="cancelModalTitle"
  aria-hidden="true"
>
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLongTitle">Cancel Fund Subscription</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">
        <p>You are about to cancel your subscription to the fund:</p>
        <p>
          <strong>{{ fundName() }}</strong>
        </p>
        <p class="text-muted">This action will stop your participation in this fund.</p>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Go Back</button>

        <button
          type="button"
          class="btn btn-danger"
          data-bs-dismiss="modal"
          (click)="onCancelFund()"
        >
          Confirm Cancellation
        </button>
      </div>
    </div>
  </div>
</div>
