<div
  class="modal fade"
  id="subscribeModal"
  tabindex="-1"
  role="dialog"
  aria-labelledby="subscribeModalTitle"
  aria-hidden="true"
>
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLongTitle">Subscribe Fund</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p>
          You are subscribing to the fund: <strong>{{ fund()?.name }}</strong>
        </p>

        <p class="m-0">Introduce ammount - min amount: {{ fund()?.minAmount | currency: 'COP' }}</p>
        <div class="input-group">
          <div class="input-group-prepend">
            <span class="input-group-text">$</span>
          </div>
          <input
            type="number"
            [(ngModel)]="amount"
            class="form-control"
            aria-label="Amount (to the nearest dollar)"
          />
        </div>
        @if (errorMessage()) {
          <p class="text-danger">{{ errorMessage() }}</p>
        }

        <h6 class="mt-3">How would you like to receive notifications?</h6>

        <button
          type="button"
          class="btn me-2"
          [class]="
            notificationPreference() === 'EMAIL'
              ? 'btn btn-primary me-2'
              : 'btn btn-outline-primary me-2'
          "
          (click)="selectNotificationPreference('EMAIL')"
        >
          Notify me by Email
        </button>

        <button
          type="button"
          [class]="
            notificationPreference() === 'SMS'
              ? 'btn btn-primary me-2'
              : 'btn btn-outline-primary me-2'
          "
          (click)="selectNotificationPreference('SMS')"
        >
          Notify me by SMS
        </button>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>

        <button
          type="button"
          class="btn btn-primary"
          data-bs-dismiss="modal"
          (click)="onSubscribe()"
          [disabled]="checkDisabled()"
        >
          Confirm Subscription
        </button>
      </div>
    </div>
  </div>
</div>
