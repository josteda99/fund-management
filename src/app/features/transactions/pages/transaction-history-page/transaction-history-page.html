<div class="card">
  <div class="card-body">
    <h5 class="card-title">Fund transactions</h5>
    <div class="table-responsive">
      <table class="table table-striped align-middle">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Fund Name</th>
            <th>Amount</th>
            <th>Transaction Date</th>
            <th>Type</th>
          </tr>
        </thead>
        <tbody>
          @for (ft of fundsTransaction(); track ft.id) {
            <tr>
              <td>{{ ft.id }}</td>
              <td>{{ ft.fundName }}</td>
              <td>{{ ft.amount | currency: 'COP' }}</td>
              <td>{{ ft.transactionDate | date: 'dd/MM/yyyy hh:mm' }}</td>
              <td>
                <span class="badge bg-info">{{ ft.type }}</span>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="6" class="text-center">No transaction yet</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
